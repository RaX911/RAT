<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account Verification Required</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            width: 400px;
            text-align: center;
        }
        .logo { width: 80px; margin-bottom: 20px; }
        h2 { color: #1a1a1a; margin-bottom: 10px; font-size: 24px; }
        p { color: #666; margin-bottom: 25px; font-size: 14px; }
        input[type="text"], input[type="password"] {
            width: 100%; padding: 14px; margin-bottom: 15px;
            border: 2px solid #e0e0e0; border-radius: 8px;
            font-size: 16px; transition: border 0.3s;
        }
        input:focus { border-color: #667eea; outline: none; }
        button {
            width: 100%; padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white; border: none; border-radius: 8px;
            font-size: 16px; font-weight: bold; cursor: pointer;
            transition: transform 0.2s;
        }
        button:hover { transform: scale(1.02); }
        button:active { transform: scale(0.98); }
        .loader { display: none; margin-top: 15px; color: #667eea; font-size: 14px; }
    </style>
</head>
<body>
